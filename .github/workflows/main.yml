  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    /* ===== 全局 ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Roboto, system-ui, sans-serif; background: #f6f9fc; color: #1e293b; line-height: 1.6; }
    html { scroll-behavior: smooth; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    img { max-width: 100%; display: block; height: auto; }
    a { text-decoration: none; color: inherit; }

    /* ===== 导航栏 ===== */
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      padding: 18px 0; transition: 0.3s ease; background: transparent;
    }
    .navbar.scrolled { background: rgba(255,255,255,0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.06); padding: 12px 0; }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -0.5px; transition: 0.3s; }
    .navbar.scrolled .logo { color: #0a4b7a; }
    .logo span { font-weight: 300; }
    .nav-menu { display: flex; align-items: center; gap: 24px; list-style: none; font-weight: 500; flex-wrap: wrap; }
    .nav-menu a { color: #fff; transition: 0.2s; font-size: 15px; padding: 6px 0; border-bottom: 2px solid transparent; }
    .navbar.scrolled .nav-menu a { color: #1e293b; }
    .nav-menu a:hover { border-bottom-color: #0a4b7a; color: #0a4b7a; }
    .lang-switch { display: flex; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 30px; padding: 4px; }
    .navbar.scrolled .lang-switch { background: #eef2f6; }
    .lang-btn { border: none; background: transparent; padding: 4px 14px; border-radius: 30px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; color: #fff; }
    .navbar.scrolled .lang-btn { color: #1e293b; }
    .lang-btn.active { background: #fff; color: #0a4b7a; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .navbar.scrolled .lang-btn.active { background: #fff; }
    .nav-toggle { display: none; font-size: 26px; background: none; border: none; color: #fff; cursor: pointer; }
    .navbar.scrolled .nav-toggle { color: #1e293b; }

    /* ===== 语言容器 ===== */
    .lang-content { display: none; }
    .lang-content.active { display: block; }

    /* ===== 英雄区 ===== */
    .hero {
      height: 100vh; min-height: 600px; display: flex; align-items: center; justify-content: center;
      text-align: center; color: #fff; position: relative;
      background: url('https://images.unsplash.com/photo-1581093588401-fbb62a02f120?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    }
    .hero::after { content: ''; position: absolute; inset: 0; background: rgba(0,20,50,0.60); }
    .hero .container { position: relative; z-index: 2; }
    .hero h1 { font-size: 56px; font-weight: 700; margin-bottom: 16px; text-shadow: 0 4px 20px rgba(0,0,0,0.2); animation: fadeUp 1s ease; }
    .hero p { font-size: 20px; max-width: 700px; margin: 0 auto 30px; opacity: 0.9; text-shadow: 0 2px 10px rgba(0,0,0,0.3); animation: fadeUp 1.2s ease; }
    .btn-primary { display: inline-block; background: #0a4b7a; color: #fff; padding: 14px 44px; border-radius: 50px; font-weight: 600; font-size: 18px; transition: 0.3s; box-shadow: 0 8px 30px rgba(10,75,122,0.4); animation: fadeUp 1.4s ease; }
    .btn-primary:hover { background: #003366; transform: translateY(-3px); box-shadow: 0 12px 40px rgba(10,75,122,0.5); }
    @keyframes fadeUp { 0%{opacity:0;transform:translateY(40px)} 100%{opacity:1;transform:translateY(0)} }

    /* ===== 通用 ===== */
    .section-title { font-size: 36px; font-weight: 700; text-align: center; color: #003366; margin: 60px 0 16px; }
    .section-sub { text-align: center; color: #475569; font-size: 18px; margin-bottom: 40px; }
    .section-block { background: #fff; border-radius: 30px; padding: 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); margin: 30px 0; }
    .section-block h3 { font-size: 26px; color: #0a4b7a; margin-bottom: 16px; }
    .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 40px; list-style: none; padding: 0; }
    .grid-2col li::before { content: "✓"; color: #0a4b7a; font-weight: 700; margin-right: 10px; }

    /* ===== 产品卡片 ===== */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .product-card { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.06); transition: 0.35s cubic-bezier(0.25,0.46,0.45,0.94); cursor: pointer; }
    .product-card:hover { transform: translateY(-12px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); }
    .product-card .card-img { width: 100%; height: 200px; background: #e8edf4; overflow: hidden; }
    .product-card .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    .product-card:hover .card-img img { transform: scale(1.05); }
    .product-card .card-body { padding: 22px 20px 26px; }
    .product-card h4 { font-size: 22px; color: #0a4b7a; margin-bottom: 6px; }
    .product-card .sub-cat { font-weight: 600; color: #1e293b; margin: 14px 0 4px; font-size: 15px; border-top: 1px solid #e2e8f0; padding-top: 14px; }
    .product-card ul { padding-left: 18px; margin: 6px 0; font-size: 14px; }
    .product-card .app-tag { display: inline-block; background: #dbeafe; color: #0a4b7a; font-size: 12px; padding: 2px 14px; border-radius: 20px; margin: 4px 4px 0 0; }

    /* ===== 模态框 ===== */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: #fff; max-width: 900px; width: 100%; max-height: 90vh; border-radius: 30px; overflow-y: auto; padding: 40px; position: relative; animation: modalIn 0.3s ease; }
    @keyframes modalIn { 0%{opacity:0;transform:scale(0.9) translateY(30px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
    .modal-close { position: absolute; top: 20px; right: 25px; font-size: 28px; background: none; border: none; cursor: pointer; color: #1e293b; transition: 0.2s; }
    .modal-close:hover { color: #0a4b7a; transform: rotate(90deg); }
    .modal-box .modal-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }
    .modal-box h2 { font-size: 30px; color: #0a4b7a; margin-bottom: 10px; }
    .modal-box .modal-desc { font-size: 16px; color: #334155; margin-bottom: 16px; }
    .modal-box .modal-spec { background: #f1f5f9; padding: 16px 20px; border-radius: 16px; margin: 16px 0; }
    .modal-box .modal-spec h4 { margin-bottom: 6px; color: #0a4b7a; }
    .modal-box .modal-app { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .modal-box .modal-app span { background: #dbeafe; padding: 4px 16px; border-radius: 20px; font-size: 14px; color: #0a4b7a; }
    .modal-box .btn-inquiry { display: inline-block; margin-top: 20px; background: #0a4b7a; color: #fff; padding: 12px 36px; border-radius: 50px; font-weight: 600; transition: 0.3s; border: none; cursor: pointer; }
    .modal-box .btn-inquiry:hover { background: #003366; }

    /* ===== FAQ ===== */
    .faq-item { border-bottom: 1px solid #e2e8f0; padding: 16px 0; }
    .faq-item .q { font-weight: 700; color: #0a4b7a; cursor: pointer; display: flex; justify-content: space-between; }
    .faq-item .q i { transition: 0.3s; }
    .faq-item .a { display: none; padding-top: 8px; color: #475569; }
    .faq-item.open .a { display: block; }
    .faq-item.open .q i { transform: rotate(180deg); }

    /* ===== 联系方式 ===== */
    .contact-box { background: #fff; border-radius: 30px; padding: 40px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); margin: 30px 0; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px; }
    .contact-item { display: flex; align-items: center; gap: 12px; font-size: 16px; }
    .contact-item i { font-size: 24px; color: #0a4b7a; width: 30px; }
    .social-links a { font-size: 26px; margin-left: 18px; color: #1e293b; transition: 0.2s; }
    .social-links a:hover { color: #0a4b7a; }

    /* ===== 页脚 ===== */
    footer { text-align: center; padding: 28px 0 18px; border-top: 1px solid #e2e8f0; color: #64748b; font-size: 14px; }

    /* ===== 回到顶部 ===== */
    .back-top { position: fixed; bottom: 30px; right: 30px; background: #0a4b7a; color: #fff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 20px rgba(10,75,122,0.3); transition: 0.3s; z-index: 999; opacity: 0; visibility: hidden; }
    .back-top.show { opacity: 1; visibility: visible; }
    .back-top:hover { background: #003366; transform: translateY(-4px); }

    /* ===== 滚动动画 ===== */
    .fade-section { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .fade-section.visible { opacity: 1; transform: translateY(0); }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .hero h1 { font-size: 34px; }
      .hero p { font-size: 17px; }
      .nav-menu { display: none; width: 100%; flex-direction: column; gap: 14px; padding: 18px 0 8px; border-top: 1px solid rgba(255,255,255,0.2); margin-top: 12px; }
      .navbar.scrolled .nav-menu { border-top-color: #e2e8f0; }
      .nav-menu.open { display: flex; }
      .nav-toggle { display: block; }
      .lang-switch { margin-top: 6px; }
      .section-title { font-size: 28px; }
      .grid-2col { grid-template-columns: 1fr; }
      .contact-box { flex-direction: column; align-items: flex-start; }
      .modal-box { padding: 24px; }
      .product-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
