<script>
  (function() {
    // ---------- 产品数据 ----------
    const productsData = {
      zh: [
        { id:1, name:'初效过滤器', img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'空调通风系统的第一道防线，拦截大颗粒物，保护后端过滤器。', specs:['过滤效率 G4','阻力 ≤ 50Pa','耐温 80°C','边框材质 铝合金/镀锌板'], apps:['办公楼中央空调','工厂通风预过滤','医院普通区域'] },
        { id:2, name:'中效过滤器', img:'https://images.unsplash.com/photo-1581093588401-fbb62a02f120?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'捕获1-10微米中等颗粒物，空调系统的第二道防线。', specs:['过滤效率 F7-F9','阻力 ≤ 120Pa','耐温 70°C','袋式/板式结构'], apps:['制药厂洁净车间','电子厂空调系统','医院手术室前置过滤'] },
        { id:3, name:'高效过滤器 / HEPA', img:'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'捕获0.3微米以上颗粒，效率≥99.97%，医疗、制药、电子核心设备。', specs:['过滤效率 H13-H14','阻力 ≤ 220Pa','耐温 80°C','无隔板/有隔板'], apps:['手术室 / ICU','制药车间','半导体洁净室'] },
        { id:4, name:'化学过滤器', img:'https://images.unsplash.com/photo-1581092160607-ee22621dd758?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'去除有害气体和异味，采用活性炭等吸附材料。', specs:['吸附效率 ≥ 90%','活性炭/浸渍氧化铝','风阻 ≤ 80Pa','可定制尺寸'], apps:['医院实验室','化工厂喷涂车间','数据中心'] },
        { id:5, name:'新风系统专用过滤器', img:'https://images.unsplash.com/photo-1581092335871-8f9e9d7c3d3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'专为新风系统设计，拦截室外空气中的颗粒物。', specs:['初效+中效一体化','风阻 ≤ 60Pa','可清洗重复使用','专利 CN218296166U'], apps:['新风机组','住宅 / 商用通风'] },
        { id:6, name:'FFU风机过滤单元', img:'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'洁净室顶部关键设备，内置HEPA，提供持续洁净空气。', specs:['内置H13 HEPA','风量 500-2000 CMH','噪声 ≤ 55dB','铝合金框架'], apps:['电子洁净室','医药洁净室','半导体 / 光伏车间'] }
      ],
      en: [
        { id:1, name:'Pre-Filters', img:'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'First line of defense, capture large particles to protect downstream filters.', specs:['Efficiency G4','Resistance ≤ 50Pa','Temp. 80°C','Aluminum/Galvanized frame'], apps:['Office HVAC','Factory pre-filtration','General hospital areas'] },
        { id:2, name:'Mid-Filters', img:'https://images.unsplash.com/photo-1581093588401-fbb62a02f120?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'Capture 1-10 µm particles, second line of defense.', specs:['Efficiency F7-F9','Resistance ≤ 120Pa','Temp. 70°C','Bag/Panel type'], apps:['Pharmaceutical cleanrooms','Electronics HVAC','OR pre-filtration'] },
        { id:3, name:'HEPA Filters', img:'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'Capture ≥0.3 µm particles, efficiency ≥99.97%, core for medical, pharma, electronics.', specs:['Efficiency H13-H14','Resistance ≤ 220Pa','Temp. 80°C','Non-partition/Partition'], apps:['OR / ICU','Pharmaceutical workshops','Semiconductor cleanrooms'] },
        { id:4, name:'Chemical Filters', img:'https://images.unsplash.com/photo-1581092160607-ee22621dd758?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'Remove harmful gases and odors using activated carbon and adsorbents.', specs:['Adsorption ≥ 90%','Activated carbon/Impregnated alumina','Resistance ≤ 80Pa','Custom sizes'], apps:['Hospital labs','Chemical / painting plants','Data centers'] },
        { id:5, name:'Fresh Air System Filters', img:'https://images.unsplash.com/photo-1581092335871-8f9e9d7c3d3b?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'Designed for fresh air units to capture outdoor particles.', specs:['Pre+Mid integrated','Resistance ≤ 60Pa','Washable','Patent CN218296166U'], apps:['Fresh air units','Residential / commercial ventilation'] },
        { id:6, name:'FFU (Fan Filter Units)', img:'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&h=400&q=80', desc:'Key ceiling equipment for cleanrooms, with built-in HEPA.', specs:['Built-in H13 HEPA','Airflow 500-2000 CMH','Noise ≤ 55dB','Aluminum frame'], apps:['Electronics cleanrooms','Pharmaceutical cleanrooms','Semiconductor / PV workshops'] }
      ]
    };

    // ---------- 渲染产品卡片 ----------
    function renderProducts(lang) {
      const data = productsData[lang];
      const containerId = lang === 'zh' ? 'productGrid' : 'productGridEn';
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = data.map(p => `
        <div class="product-card" data-id="${p.id}" data-lang="${lang}">
          <div class="card-img"><img src="${p.img}" alt="${p.name}"></div>
          <div class="card-body">
            <h4>${p.name}</h4>
            <p style="font-size:14px;color:#475569;">${p.desc.slice(0, 40)}${p.desc.length>40?'...':''}</p>
            <div style="margin-top:12px;">${p.apps.map(a => `<span class="app-tag">${a}</span>`).join('')}</div>
          </div>
        </div>
      `).join('');
      container.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          const lang = this.dataset.lang;
          openModal(id, lang);
        });
      });
    }

    // ---------- 模态框 ----------
    function openModal(id, lang) {
      const data = productsData[lang];
      const product = data.find(p => p.id === id);
      if (!product) return;
      document.getElementById('modalImg').src = product.img;
      document.getElementById('modalImg').alt = product.name;
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalDesc').textContent = product.desc;
      document.getElementById('modalSpecList').innerHTML = product.specs.map(s => `<li>${s}</li>`).join('');
      document.getElementById('modalAppTags').innerHTML = product.apps.map(a => `<span>${a}</span>`).join('');
      document.getElementById('productModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      document.getElementById('productModal').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('productModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    // ---------- FAQ 数据 ----------
    const faqData = {
      zh: [
        { q: '你们的产品有哪些认证？', a: '我们通过了ISO9001、ISO14001、欧盟CE认证，并拥有MA.AL CNAS国家检验报告，产品满足医疗、制药、电子等行业标准。' },
        { q: '最小起订量是多少？', a: '常规产品无起订量限制，定制产品根据具体规格协商。' },
        { q: '交货期大概多久？', a: '常规产品3-7个工作日，定制产品10-20个工作日。' },
        { q: '可以寄送样品吗？', a: '可以，我们支持样品寄送，运费由客户承担，正式订单时全额抵扣。' },
        { q: '是否支持贴牌生产？', a: '支持OEM/ODM，可根据客户需求定制包装和品牌标识。' }
      ],
      en: [
        { q: 'What certifications do your products have?', a: 'We have ISO9001, ISO14001, EU CE, and MA.AL CNAS national inspection reports. Products meet medical, pharmaceutical, and electronics industry standards.' },
        { q: 'What is the minimum order quantity?', a: 'No MOQ for standard products; customized products are negotiated based on specifications.' },
        { q: 'What is the lead time?', a: '3-7 working days for standard products, 10-20 working days for customized.' },
        { q: 'Can you send samples?', a: 'Yes, we support sample shipping, shipping costs borne by the customer, and the sample cost is fully deductible from the first order.' },
        { q: 'Do you support OEM/ODM?', a: 'Yes, we support OEM/ODM, packaging and branding can be customized.' }
      ]
    };

    function renderFAQ(lang) {
      const containerId = lang === 'zh' ? 'faqContainer' : 'faqContainerEn';
      const container = document.getElementById(containerId);
      if (!container) return;
      const data = faqData[lang];
      container.innerHTML = data.map((item, index) => `
        <div class="faq-item" data-index="${index}">
          <div class="q"><span>${item.q}</span><i class="fas fa-chevron-down"></i></div>
          <div class="a">${item.a}</div>
        </div>
      `).join('');
      container.querySelectorAll('.faq-item .q').forEach(q => {
        q.addEventListener('click', function() {
          this.parentElement.classList.toggle('open');
        });
      });
    }

    // ---------- 语言切换 + 修复锚点跳转 ----------
    let currentLang = 'zh';

    function setLanguage(lang) {
      currentLang = lang;
      // 更新按钮状态
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      // 切换显示
      document.querySelectorAll('.lang-content').forEach(el => {
        el.classList.toggle('active', el.id === 'lang-' + lang);
      });
      // 重新渲染产品 & FAQ
      renderProducts(lang);
      renderFAQ(lang);
      localStorage.setItem('preferred-lang', lang);
      closeModal();
    }

    // 监听语言切换按钮
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const lang = this.dataset.lang;
        setLanguage(lang);
      });
    });

    // 初始化
    const savedLang = localStorage.getItem('preferred-lang');
    const initialLang = (savedLang === 'zh' || savedLang === 'en') ? savedLang : 'zh';
    setLanguage(initialLang);

    // ---------- 导航锚点跳转（手动拦截，确保中英文均有效） ----------
    const navLinks = document.querySelectorAll('.nav-menu a[href^="#"]');
    navLinks.forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('href'); // "#home", "#about" ...
        const targetElement = document.querySelector(targetId);
        if (targetElement) {
          // 计算偏移量（固定导航栏高度约70px）
          const navHeight = document.getElementById('navbar').offsetHeight || 70;
          const top = targetElement.getBoundingClientRect().top + window.scrollY - navHeight - 10;
          window.scrollTo({ top, behavior: 'smooth' });
          // 关闭移动端菜单
          document.getElementById('navMenu').classList.remove('open');
        }
      });
    });

    // 补丁：英雄区“查看产品”按钮同样处理
    document.querySelectorAll('.btn-primary').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        const targetId = this.getAttribute('href');
        const targetElement = document.querySelector(targetId);
        if (targetElement) {
          const navHeight = document.getElementById('navbar').offsetHeight || 70;
          const top = targetElement.getBoundingClientRect().top + window.scrollY - navHeight - 10;
          window.scrollTo({ top, behavior: 'smooth' });
        }
      });
    });

    // ---------- 导航栏滚动透明 ----------
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function() {
      navbar.classList.toggle('scrolled', window.scrollY > 60);
      document.getElementById('backTop').classList.toggle('show', window.scrollY > 400);
    });

    // ---------- 手机菜单 ----------
    const toggleBtn = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');
    toggleBtn.addEventListener('click', function() {
      navMenu.classList.toggle('open');
    });

    // ---------- 滚动动画 ----------
    const sections = document.querySelectorAll('.fade-section');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15 });
    sections.forEach(sec => observer.observe(sec));

  })();
</script>
